<!DOCTYPE html><html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSZI Panel</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }.box {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 12px;
  width: 320px;
  box-shadow: 0 0 20px rgba(0,255,100,0.2);
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
}

button {
  background: #00ff88;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #00cc6a;
}

.hidden {
  display: none;
}

a {
  color: #00ff88;
  word-break: break-all;
}

  </style>
</head>
<body><div id="loginBox" class="box">
  <h2>Login</h2>
  <input id="user" placeholder="login" />
  <input id="pass" type="password" placeholder="hasło" />
  <button type="button" onclick="login()">Zaloguj</button>
  <p id="err" style="color:red"></p>
</div><div id="panel" class="box hidden">
  <h2>OSZI Panel 🔥</h2>
  <p>Zalogowany ziomuś 😎</p>  <input id="linkInput" placeholder="wklej Google Drive / link unreleasa" />
  <button type="button" onclick="addLink()">Dodaj unreleas</button>  <h3>Lista:</h3>
  <div id="list"></div><button type="button" onclick="logout()" style="background:#ff3b3b;margin-top:15px;">Wyloguj</button>

</div><script>
  const USERS = {
    "oszi": "1234",
    "admin": "admin"
  };

  function login() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;

    if (USERS[u] && USERS[u] === p) {
      localStorage.setItem("logged", "true");
      showPanel();
    } else {
      document.getElementById('err').innerText = "Zły login albo hasło, ziomuś";
    }
  }

  function showPanel() {
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('panel').classList.remove('hidden');
    loadLinks();
  }

  function logout() {
    localStorage.removeItem("logged");
    location.reload();
  }

  function addLink() {
    const input = document.getElementById('linkInput');
    const links = JSON.parse(localStorage.getItem('links') || "[]");

    if (input.value.trim() === "") return;

    links.push(input.value);
    localStorage.setItem('links', JSON.stringify(links));
    input.value = "";
    loadLinks();
  }

  function loadLinks() {
    const list = document.getElementById('list');
    const links = JSON.parse(localStorage.getItem('links') || "[]");

    list.innerHTML = "";

    links.forEach(l => {
      const a = document.createElement('a');
      a.href = l;
      a.target = "_blank";
      a.innerText = l;
      list.appendChild(a);
      list.appendChild(document.createElement('br'));
    });
  }

  if (localStorage.getItem("logged") === "true") {
    showPanel();
  }
</script></body>
  </html>
