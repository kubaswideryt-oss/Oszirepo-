<!DOCTYPE html><html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSZI HUB</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }.box {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 12px;
  width: 340px;
  box-shadow: 0 0 20px rgba(0,255,100,0.2);
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
}

button {
  background: #00ff88;
  cursor: pointer;
  font-weight: bold;
}

button:hover { background: #00cc6a; }

.hidden { display:none; }

a { color:#00ff88; word-break: break-all; }

  </style>
</head>
<body><div id="loginBox" class="box">
  <h2>Login</h2>
  <input id="user" placeholder="login" />
  <input id="pass" type="password" placeholder="hasło" />
  <button type="button" onclick="login()">Zaloguj</button>
  <p id="err" style="color:red"></p>
</div><div id="panel" class="box hidden">
  <h2>OSZI HUB 🔥</h2>
  <p id="roleText"></p>  <input id="linkInput" placeholder="wklej unreleasa / google drive" />
  <button onclick="addLink()">Dodaj</button>  <h3>Unreleasy:</h3>
  <div id="list"></div><button onclick="logout()" style="background:#ff3b3b;margin-top:15px;">Wyloguj</button>

</div><script>
// 🔥 SUPABASE 
const SUPABASE_URL =  "https://bdlgfcjzxwomvfudmfiv.supabase.co/rest/v1/";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkbGdmY2p6eHdvbXZmdWRtZml2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODg1MTMsImV4cCI6MjA5MjI2NDUxM30.IeJzd5Pj74nOofbfbehm4NjGjxb-UJyEWKozHbeok3A";

// 🔐 proste role (na start)
const USERS = {
  "oszi": { pass: "1234", role: "admin" },
  "9ecd": { pass: "sperma", role: "user" },
  "storm": { pass: "DziwkiKoksTajskiBoks", role: "user" }
};

let currentUser = null;

function login() {
  const u = document.getElementById('user').value;
  const p = document.getElementById('pass').value;

  if (USERS[u] && USERS[u].pass === p) {
    currentUser = { name: u, role: USERS[u].role };
    localStorage.setItem("user", JSON.stringify(currentUser));
    showPanel();
  } else {
    document.getElementById('err').innerText = "Zły login albo hasło";
  }
}

function showPanel() {
  document.getElementById('loginBox').classList.add('hidden');
  document.getElementById('panel').classList.remove('hidden');

  const saved = JSON.parse(localStorage.getItem("user"));
  if (saved) currentUser = saved;

  document.getElementById('roleText').innerText = "Zalogowany: " + currentUser.name + " („ + currentUser.role + ")";

  loadLinks();
}

function logout() {
  localStorage.removeItem("user");
  location.reload();
}

async function loadLinks() {
  const list = document.getElementById('list');
  list.innerHTML = "Ładowanie...";

  const res = await fetch(SUPABASE_URL + "/rest/v1/links?select=*", {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  const data = await res.json();

  list.innerHTML = "";

  data.forEach(item => {
    const a = document.createElement('a');
    a.href = item.url;
    a.target = "_blank";
    a.innerText = item.url;
    list.appendChild(a);
    list.appendChild(document.createElement('br'));
  });
}

async function addLink() {
  if (!currentUser) return;

  const input = document.getElementById('linkInput');
  if (!input.value.trim()) return;

  await fetch(SUPABASE_URL + "/rest/v1/links", {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      Prefer: "return=representation"
    },
    body: JSON.stringify({ url: input.value, user: currentUser.name })
  });

  input.value = "";
  loadLinks();
}

if (localStorage.getItem("user")) {
  showPanel();
}
</script></body>
</html>
