<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>???</title>
<style>
    body {
        background: black;
        color: lime;
        font-family: "Courier New", monospace;
        text-align: center;
        margin-top: 100px;
    }
    button {
        background: black;
        color: lime;
        border: 2px solid lime;
        padding: 10px 20px;
        margin: 10px;
        cursor: pointer;
        font-size: 16px;
    }
    button:hover {
        background: lime;
        color: black;
    }
    #content {
        margin-top: 30px;
        font-size: 20px;
    }
</style>
</head>
<body>

<h1 id="question">czy na pewno?</h1>

<div id="buttons">
    <button onclick="handleAnswer(false)">nie</button>
    <button onclick="handleAnswer(true)">tak</button>
</div>

<div id="content"></div>

<script>
let stage = 0;

function handleAnswer(answer) {
    const question = document.getElementById("question");
    const content = document.getElementById("content");

    if (!answer) {
        content.innerText = "spierdalaj";
        return;
    }

    if (stage === 0) {
        question.innerText = "ej serio ziomek?";
        content.innerText = "";
        stage = 1;
    } else if (stage === 1) {
        question.innerText = "";
        document.getElementById("buttons").style.display = "none";
        content.innerText = "ładowanie śmieciu jebany, zara oszi ci da unreleasa...";

        setTimeout(() => {
            // TU WSTAW SWÓJ LINK
            window.location.href = "TUTAJ_WSTAW_LINK_DO_GOOGLE_DRIVE";
        }, 5000);
    }
}
</script>

</body>
  </html>
