<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSZI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="bgmusic" autoplay loop>
  <source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Kevin_MacLeod/Drama/Kevin_MacLeod_-_Dark_Star.mp3" type="audio/mp3">
</audio>

<div class="overlay"></div>

<div class="main">

    <h1 class="logo">OSZI</h1>

    <div class="buttons">
        <button onclick="showPopup('label')">JungCollective Label®</button>
        <button onclick="showPopup('unreleased')">UnReleased 💜</button>
        <button onclick="showPopup('tracks')">UTWORY</button>
        <button onclick="showPopup('future')">CO SIĘ SZYKUJE?</button>
    </div>

    <div class="bottomtexts">
        <p>MORE COMING SOON</p>
        <p>Wytwórnia Osziego Wkrótce</p>
        <p>OSZI - NADESZŁA NOWA ERA TRAPU, RÓB CO CHCESZ NIE CO MUSISZ.</p>
    </div>

</div>

<div id="popup" class="popup">
   <div class="popup-content">
      <span class="close" onclick="closePopup()">×</span>
      <div id="popupText"></div>
   </div>
</div>

<script src="script.js"></script>
</body>
</html>
