<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSZI - Underground Artist</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animated Neon Background -->
    <div class="neon-bg"></div>
    <canvas id="canvas"></canvas>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="artist-name">OSZI</h1>
            <p class="subtitle">ŻYJMY ŻYCIEM NAJLEPSZYM</p>
        </header>

        <!-- Navigation buttons -->
        <nav class="nav-buttons">
            <button class="neon-btn btn-red" id="labelBtn">LABEL</button>
            <button class="neon-btn btn-orange" id="unreleasedBtn">UNRELEASED</button>
            <button class="neon-btn btn-cyan" id="nutyBtn">NUTY</button>
            <button class="neon-btn btn-purple" id="collaborationBtn">WSPÓŁPRACA</button>
        </nav>

        <!-- Content Display Area -->
        <div class="content-display" id="contentDisplay"></div>

        <!-- Modal for Password -->
        <div class="modal" id="passwordModal">
            <div class="modal-content">
                <span class="close" id="closePasswordModal">&times;</span>
                <h2 class="modal-title">UNLOCK UNRELEASED</h2>
                <div class="input-group">
                    <input type="password" id="passwordInput" placeholder="Enter password..." class="password-input">
                    <button class="submit-btn" id="submitPasswordBtn">UNLOCK</button>
                </div>
                <div id="passwordFeedback"></div>
            </div>
        </div>

        <!-- Modal for Links -->
        <div class="modal" id="linkModal">
            <div class="modal-content">
                <span class="close" id="closeLinkModal">&times;</span>
                <h2 class="modal-title" id="linkModalTitle"></h2>
                <a href="" id="linkButton" target="_blank" class="link-btn">OPEN LINK</a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>MORE COMING SOON, MY OWN LABEL TOO</p>
        <p>ŻYJMY ŻYCIEM NAJLEPSZYM - OSZI</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
